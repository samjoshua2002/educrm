version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: admissions-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: admissions_crm
    ports:
      - "5432:5432"
    volumes:
      - educrm_postgres_data:/var/lib/postgresql/data
    networks:
      - admissions

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: admissions-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - admissions

volumes:
  educrm_postgres_data:
  pgadmin_data:

networks:
  admissions:
    driver: bridge
